                <div class="busqueda">
                    <input type="text" id="inputBusqueda" placeholder="Buscar por nombre o cédula..." onkeyup="cargarUsuarios()" />

            <table class="personal-table">
                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Nombre / Usuario</th>
                        <th>Teléfono</th>
                        <th>Rango</th>

                </thead>
                <tbody id="tablaUsuariosBody">

    <script src="/javascript/personal.js"></script>
