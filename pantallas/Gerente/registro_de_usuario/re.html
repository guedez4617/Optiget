<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuario</title>
    <link rel="stylesheet" href="../../../css/re.css" />
</head>

<body>
    <div class="fondo capa1"></div>

    <div class="linea_azul">
        <aside class="ancho_linea">
            <h2>Gerente</h2>
            <nav>
                <ul>
                    <li><a href="../../inicio/inicio.html">Inicio</a></li>
                    <li id="opcion-panel"><a href="../panel_general/panel_general.html">Panel General</a></li>
                    <li id="opcion-usuarios"><a href="../personal/per.html">Usuarios</a></li>
                    <li id="opcion-creditos"><a href="../lista de deudore/lis.html">Créditos</a></li>
                    <li id="opcion-facturacion"><a href="../../Cajera/caja/principal.html">Facturación</a></li>
                    <li id="opcion-historial"><a href="../../Cajera/historial_ventas/his.html">Historial de ventas</a></li>
                    <li id="opcion-almacen"><a href="../../Almacen/Gestión de Productos/gestion_de_produtos.html">Almacén</a></li>
                    <li id="opcion-configuracion"><a href="../../configuracion/ajustes.html">Configuración</a></li>
                    <li><a href="../../../index.html" id="btnSalir">Salir</a></li>
                </ul>

            </nav>
        </aside>

        <main class="panel">
            <header class="altura_cuadro">
                <h1 id="tituloPantalla">Registro de Usuario</h1>
            </header>

            <form class="formulario-usuario" id="formUsuario">
                <label for="usuario">Nombre:</label>
                <input type="text" id="nombre" required />

                <label for="usuario">apellido:</label>
                <input type="text" id="apellido" required />

                <label for="usuario">usuario:</label>
                <input type="text" id="usuario" required />

                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" required />

                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono" required />

                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" required />

                <label for="rango">Rango:</label>
                <select id="rango" required>
                    <option value="">Seleccione un rango</option>
                    <option value="1">Gerente</option>
                    <option value="2">Cajero</option>
                    <option value="3">Supervisor</option>
                </select>

                <button class="btn-registro" type="submit" id="btnAccion">Registrar Usuario</button>
                <a href="../personal/per.html" onclick="localStorage.removeItem('usuarioAEditar')" style="display:block; text-align:center; margin-top:10px; color:gray; text-decoration:none;">Cancelar</a>
            </form>
        </main>
    </div>
    <script src="../../../javascript/permisos.js"></script>
    <script src="../../../javascript/guardar_personal.js"></script>

</body>

</html>
