        </aside>

        <main class="panel">
            <div class="altura_cuadro">
                <h1>Registro de Nuevo credito</h1>
            </div>

            <div class="centrar-formulario">
                <form class="formulario-cliente" action="../caja/principal.html" method="get">
                    <label for="cedula">Cédula:</label>
                    <input type="text" id="cedula" name="cedula" placeholder="Ej. V-12345678" required />
                    <button type="button" class="btn-buscar">Buscar</button>

                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Raúl Martinez" required />
                    <label for="nombre">Numero de Telefono:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. 0412-****-**-**" required />
                    <label for="nombre">Direcion:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. acarigua" required />
                    <label for="fecha_caducidad">Fecha de compra</label>
                    <input type="date" id="fecha_de_compra">
                    <label for="fecha_caducidad">Fecha limite</label>
                    <input type="date" id="fecha_limite">


                    <button class="btn-nueva" type="submit">finalisar compra</button>
                </form>
            </div>
        </main>
    </div>
</body>
