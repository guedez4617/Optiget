<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Nuevo Cliente</title>
    <link rel="stylesheet" href="../../../css/registro_cli.css" />
</head>

<body>
    <div class="fondo capa1"></div>

    <div class="linea_azul">
        <aside class="ancho_linea">
            <h2>Clientes</h2>
            <nav>
                <ul>
                    <li><a href="../../inicio/inicio.html">Inicio</a></li>
                    <li id="opcion-panel"><a href="../../Gerente/panel_general/panel_general.html">Panel General</a></li>
                    <li id="opcion-usuarios"><a href="../../Gerente/personal/per.html">Usuarios</a></li>
                    <li id="opcion-creditos"><a href="../../Gerente/lista de deudore/lis.html">Créditos</a></li>
                    <li id="opcion-facturacion"><a href="../caja/principal.html">Facturación</a></li>
                    <li id="opcion-historial"><a href="../historial_ventas/his.html">Historial de ventas</a></li>
                    <li id="opcion-almacen"><a href="../../Almacen/Gestión de Productos/gestion_de_produtos.html">Almacén</a></li>
                    <li><a href="../../../index.html" id="btnSalir">Salir</a></li>
                </ul>
            </nav>
        </aside>

        <main class="panel">
            <div class="altura_cuadro">
                <h1>Cliente</h1>
            </div>

            <div class="centrar-formulario">
                <form class="formulario-cliente" id="formCliente">
                    <label for="cedula">Cédula:</label>
                    <input type="text" id="cedula" placeholder="Ej. 12345678" required />

                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" placeholder="Ej. Raúl Martinez" required />

                    <label for="telefono">Numero de Telefono:</label>
                    <input type="text" id="telefono" placeholder="Ej. 04127654321" required />

                    <label for="direccion">Direccion:</label>
                    <input type="text" id="direccion" placeholder="Ej. acarigua" required />

                    <button class="btn-nueva" type="submit">Continuar a la compra</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../../../javascript/permisos.js"></script>
    <script src="../../../javascript/guardar_cliente.js"></script>
</body>

</html>
