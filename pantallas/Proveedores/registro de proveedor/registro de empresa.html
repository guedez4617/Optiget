                </ul>
            </nav>
        </aside>

        <main class="panel">
            <div class="altura_cuadro">
                <h1>Registro de proveedor</h1>
            </div>

            <div class="centrar-formulario">
                <form class="formulario-cliente" action="/pantallas/Proveedores/lista de proveedores/listaproo.html" method="get">
                    <label for="cedula">Rif:</label>
                    <input type="text" id="cedula" name="cedula" placeholder="Ej. J-12345678" required />
                    <button type="button" class="btn-buscar">Buscar</button>

                    <label for="nombre">Nombre completo de la empresa:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Raúl Martinez" required />
                    <label for="nombre">Numero de Telefono:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. 0412-****-**-**" required />
                    <label for="nombre">Correo electronico:</label>
                    <input type="email" id="nombre" name="nombre" placeholder="Ej. hola@gmail.com" required />
                    <label for="nombre">Direcion:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. acarigua" required />

                    <button class="btn-nueva" type="submit">Agregar proveedor </button>
                </form>
            </div>
        </main>
    </div>
</body>
