<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Producto</title>
    <link rel="stylesheet" href="/css/registro_de_producto.css" />
</head>

<body>
    <div class="ancho_linea">
        <h2>Órdenes</h2>
        <ul>
            <li><a href="/pantallas/inicio/inicio.html">Inicio</a></li>
            <li><a href="/pantallas/Gerente/panel_general/panel_general.html">Panel General</a></li>
            <li><a href="/pantallas/Gerente/personal/per.html">Usuarios</a></li>
            <li><a href="/pantallas/Gerente/lista de deudore/lis.html">Créditos</a></li>
            <li><a href="/pantallas/Cajera/caja/principal.html">Facturación</a></li>
            <li><a href="/pantallas/Cajera/historial_ventas/his.html">Historial de ventas</a></li>
            <li><a href="/pantallas/Almacen/Gestión de Productos/gestion_de_produtos.html">Almacén</a></li>
            <li><a href="/pantallas/Almacen/historial_de_salida/historial_de_salida.html">Historial de salida</a></li>
            <li><a href="/pantallas/inicio de secion/index.html">Salir</a></li>
        </ul>
    </div>

    <div class="panel">
        <h1 id="tituloPagina">Registro de Producto</h1>
        <form class="altura_formulario" id="formRegistro">

            <label for="codigo_barra">Código</label>
            <input type="number" id="codigo_barra" required>

            <label for="categoria">Categoría</label>
            <input type="text" id="categoria">

            <label for="marca">Marca</label>
            <input type="text" id="marca">

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>

            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" required min="1">

            <label for="precio">Precio</label>
            <input type="number" id="precio" required step="0.01">

            <label for="iva">¿Aplica I.V.A.?</label>
            <input type="checkbox" id="iva" style="width:20px; height:20px;">

            <button type="submit" class="btn-guardar" id="btnAccion">Guardar producto</button>
            <button type="button" class="btn-atras" onclick="cancelar()">Atrás / Cancelar</button>
        </form>
    </div>

    <script src="/javascript/guardar_producto.js"></script>
</body>

</html>
