<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Producto</title>
    <link rel="stylesheet" href="../../../css/registro_de_producto.css" />
</head>

<body>
    <div class="fondo capa1"></div>

    <div class="ancho_linea">
        <h2>Órdenes</h2>
        <ul>
            <li><a href="../../inicio/inicio.html">Inicio</a></li>
            <li id="opcion-panel"><a href="../../Gerente/panel_general/panel_general.html">Panel General</a></li>
            <li id="opcion-usuarios"><a href="../../Gerente/personal/per.html">Usuarios</a></li>
            <li id="opcion-creditos"><a href="../../Gerente/lista de deudore/lis.html">Créditos</a></li>
            <li id="opcion-facturacion"><a href="../../Cajera/caja/principal.html">Facturación</a></li>
            <li id="opcion-historial"><a href="../../Cajera/historial_ventas/his.html">Historial de ventas</a></li>
            <li id="opcion-almacen"><a href="../Gestión de Productos/gestion_de_produtos.html">Almacén</a></li>
            <li id="opcion-configuracion"><a href="../../configuracion/ajustes.html">Configuración</a></li>
            <li><a href="javascript:void(0)" onclick="abrirModalSalir()">Salir</a></li>
        </ul>


    </div>

    <div class="panel">
        <h1 id="tituloPagina">Registro de Producto</h1>
        <form class="altura_formulario" id="formRegistro">

            <label for="codigo_barra">Código</label>
            <input type="text" id="codigo_barra" required>

            <label for="categoria">Categoría:</label>
            <select id="categoria" required>
                <option value="">Seleccione una categoría</option>
                <option value="Bebida Alcolicas">Bebida Alcolicas</option>
                <option value="Bebida no Alcolicas">Bebida no Alcolicas</option>
                <option value="Snacks y Pasapalos">Snacks y Pasapalos</option>
                <option value="Despensa">Despensa</option>
                <option value="Enlatado">Enlatado</option>
                <option value="Cuidado Personal y Hogar">Cuidado Personal y Hogar</option>
                <option value="Otro">Otro</option>
                <option value="Escolar">Escolar</option>
            </select>

            <label for="marca">Marca</label>
            <input type="text" id="marca">

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>

            <label for="Precentacion">Presentación</label>
            <input type="text" id="Precentacion" required>

            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" required min="1">

            <label for="precio">Precio</label>
            <input type="number" id="precio" required step="0.01">

            <div class="contenedor-iva">
                <label for="iva">¿Aplica I.V.A.?</label>
                <input type="checkbox" id="iva">
            </div>

            <button type="submit" class="btn-guardar" id="btnAccion">Guardar producto</button>
            <button type="button" class="btn-atras" onclick="cancelar()">Cancelar</button>
        </form>
    </div>
    <script src="../../../javascript/permisos.js"></script>
    <script src="../../../javascript/guardar_producto.js"></script>
    <script src="../../../javascript/logout_global.js"></script>

<script src="../../../javascript/apariencia.js"></script>
</body>

</html>
