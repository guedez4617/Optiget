<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Ventas - Login</title>
    <link rel="stylesheet" href="css/inicio_ceccion.css" />
</head>

<body>
    <div class="fondo capa1"></div>

    <div class="cuadro">
        <header>
            <h1>GESTIÓN DE VENTAS</h1>
        </header>
        <div class="icono">
            <img src="imagenes/Picsart_25-11-28_15-24-13-139.png" alt="logo" />
        </div>
        <form id="loginForm">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" placeholder="Ingresa tu usuario" required />

            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="new-password" />

            <button type="submit" class="btn-ingresar">Ingresar</button>
        </form>
    </div>

    <script src="javascript/inicio_cecion.js"></script>
<script src="javascript/apariencia.js"></script>
</body>

</html>
